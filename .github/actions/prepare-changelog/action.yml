name: Prepare Changelog
description: 'Check for publish flag and prepare CHANGELOG.md for publishing'

inputs:
  default-branch:
    description: 'The default branch to be referenced for changelog history links'
    required: false
    default: '1.21(.1)'

runs:
  using: composite
  steps:
    - name: check for publish flag and prepare CHANGELOG.md
      shell: bash
      env:
        DEFAULT_BRANCH: ${{ inputs.default-branch }}
      run: |
        set -e
        if [[ ! -f CHANGELOG.md ]]; then
          echo "::error::Missing CHANGELOG.md"
          exit 1
        fi

        first_line=$(head -n 1 CHANGELOG.md || true)

        if echo "$first_line" | grep -qE '<!--\s*publish\s*=\s*true\s*-->' ; then
          echo "::notice::Publish flag read: true. Starting publishing action."

          sed -i '1d' CHANGELOG.md

          printf '\n\n---\n' >> CHANGELOG.md

          printf "%s\n" "::notice::Appending changelog history link footer to CHANGELOG.md"
          printf "> Looking for changes of previous versions?  \n" >> CHANGELOG.md
          printf "You can find them in the [changelog history](https://www.github.com/${GITHUB_REPOSITORY}/blob/${DEFAULT_BRANCH}/CHANGELOG_history.md).\n" >> CHANGELOG.md

        elif echo "$first_line" | grep -qE '<!--\s*publish\s*=\s*false\s*-->' ; then
          echo "::notice::Publish flag read: false. Stopping publishing action."
          exit 1

        else
          echo "::error::Missing publish flag in line 1. Skipping publishing action."
          echo "::error::Please add \`<!--publish=true-->\` or \`<!--publish=false-->\` to the first line of CHANGELOG.md."
          exit 1
        fi

        perl -0777 -pe 's{<ins>([^<]+)</ins>\s*\(&#x200A;(.*?)&#x200A;\)}{
          my ($name, $block) = ($1, $2);
          my @urls = ($block =~ /href="(https?:\/\/(?:www\.)?(?:curseforge\.com|modrinth\.com)[^"]*)"/g);
          @urls ? "<ins>[$name]($urls[-1])</ins>" : $&
        }gse; s{<sub\b([^>]*)>}{<sup$1>}g; s{</sub>}{</sup>}g' CHANGELOG.md > CHANGELOG_cf.md
        

        echo "::notice::Successfully prepared CHANGELOG.md and CHANGELOG_cf.md for publishing."
        echo "::group::Prepared changelog output"
        echo "::debug::========================================"
        cat CHANGELOG.md
        echo "::debug::========================================"
        cat CHANGELOG_cf.md
        echo "::debug::========================================"
        echo "::endgroup::"
