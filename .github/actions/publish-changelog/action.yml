name: Publish Changelog
description: "Updates CHANGELOG_history.md and README.md from CHANGELOG.md, then commits & pushes the changes"

inputs:
  version:
    description: "The version number for commit message (and anchor name)"
    required: true
  modrinth-id:
    description: "Modrinth project ID"
    required: true
  modrinth-version:
    description: "Modrinth version identifier"
    required: true
  curseforge-url:
    description: "CurseForge download URL"
    required: true
  version-number:
    description: "Formatted version number (e.g., '1.0.0 + 1.21(.1)')"
    required: true
  mr-version-title:
    description: "Modrinth version title"
    required: true
  cf-version-title:
    description: "CurseForge version title"
    required: true

runs:
  using: composite
  steps:
    - name: update CHANGELOG_history.md and README.md
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        MODRINTH_ID: ${{ inputs.modrinth-id }}
        MODRINTH_VERSION: ${{ inputs.modrinth-version }}
        CURSEFORGE_URL: ${{ inputs.curseforge-url }}
        VERSION_NUMBER: ${{ inputs.version-number }}
        MR_VERSION_TITLE: ${{ inputs.mr-version-title }}
        CF_VERSION_TITLE: ${{ inputs.cf-version-title }}
      run: |
        set -e

        echo "::group::CHANGELOG.md debug output before modifications"
        echo "::debug::The following CHANGELOG.md will be slightly modified and then written to CHANGELOG_history.md and README.md:"
        echo "::debug::Current CHANGELOG.md content"
        while IFS= read -r line; do
          echo "::debug::$line"
        done < CHANGELOG.md
        echo "::endgroup::"

        changelog_start_marker='<!--CHANGELOG:START-->'
        changelog_end_marker='<!--CHANGELOG:END-->'

        # Remove the last three lines (reference to changelog history from prepare-changelog + horizontal rule)
        tac CHANGELOG.md | tail -n +4 | tac > CHANGELOG.md.tmp && mv CHANGELOG.md.tmp CHANGELOG.md

        echo "::group::Removed changelog history reference from CHANGELOG.md"
        echo "::debug::The following CHANGELOG.md will now be attempted to be written to CHANGELOG_history.md and README.md:"
        echo "::debug::Current CHANGELOG.md content"
        while IFS= read -r line; do
          echo "::debug::$line"
        done < CHANGELOG.md
        echo "::endgroup::"

        # Check if the current changelog is already in CHANGELOG_history.md
        known_changelog=false

        if [[ -f CHANGELOG_history.md && -s CHANGELOG_history.md ]]; then
          changelog_headline=$(sed -n '1p' CHANGELOG.md)
          history_headline_1=$(sed -n '1p' CHANGELOG_history.md)
          history_headline_2=$(sed -n '2p' CHANGELOG_history.md)
          if [[ "$changelog_headline" == "$history_headline_1" || "$changelog_headline" == "$history_headline_2" ]]; then
            echo "::warning::Changelog already in history. Skipping updates to CHANGELOG_history.md."
            known_changelog=true
          fi
        fi

        # Ensure CHANGELOG_history.md exists
        if [[ ! -f CHANGELOG_history.md ]]; then
          echo "::debug::CHANGELOG_history.md missing, creating."
          touch CHANGELOG_history.md
        fi

        # Ensure CHANGELOG.md ends with a newline
        if [[ $(tail -c1 CHANGELOG.md | wc -l) -eq 0 ]]; then
          echo "::debug::CHANGELOG.md had no trailing newline; adding one."
          echo >> CHANGELOG.md
        fi

          # Replace the full GH separator HTML snippet with thin spaces
          sed -i 's|</sub><!--SEPARATOR_V:GH--><img width=7 height=10 src="https://raw.githubusercontent.com/pnk2u/resources/main/ModProjects/shared/pres/icon/separator_v.svg"><sub>|&#x200A;&#x200A;&#x200A;|g' CHANGELOG.md

          # Add anchor link for the version at the top
          sed -i "1i<a name=\"$VERSION\"></a>" CHANGELOG.md

          # Add download badges line before the last separator
          mr_download_url="https://www.modrinth.com/mod/$MODRINTH_ID/version/$MODRINTH_VERSION"
          cf_download_url="$CURSEFORGE_URL"
          spacer_line_number=$(( $(wc -l < CHANGELOG.md) - 1 ))

          cat > /tmp/footer.txt <<-EOF

        <h2><sub><sub><sup><ins>Download $VERSION_NUMBER</ins>:</sup>&#x200A;
        <a title="Download (Modrinth):&#10;$MR_VERSION_TITLE" href="$mr_download_url">
        <img width=26 src="https://img.shields.io/badge/-%20-%23032a?style=flat&logo=modrinth"></a>&#x200A;
        <a title="Download (Curseforge):&#10;$CF_VERSION_TITLE" href="$cf_download_url">
        <img width=26 src="https://img.shields.io/badge/--%23302a?style=flat&logo=curseforge"></a>
        </sub></sub></h2>
        EOF

          sed -i "${spacer_line_number}r /tmp/footer.txt" CHANGELOG.md
          rm /tmp/footer.txt

        # Output the current changelog being written to CHANGELOG_history.md
        echo "::group::Changelog that will be written to CHANGELOG_history.md"
        cat CHANGELOG.md
        echo "::endgroup::"

        # Append to CHANGELOG_history.md if not already present
        if [ "$known_changelog" = false ]; then
          temp_file=$(mktemp) && cat CHANGELOG.md CHANGELOG_history.md > "$temp_file" && mv "$temp_file" CHANGELOG_history.md
        else
          echo "::notice::Skipping writing to CHANGELOG_history.md as this version is already recorded."
        fi

        # Following modifications are for README.md
        # Increase the level of the version headline and add footnote link
        second_line=$(sed -n '2p' CHANGELOG.md)
        if [[ "$second_line" == \#* ]]; then
          sed -i '2s/^#/##/' CHANGELOG.md
        else
          echo "::error::Unexpected format in CHANGELOG.md: Line 2 does not start with #"
          exit 1
        fi
        if [[ "$second_line" == *: ]]; then
          sed -i '2s/:/[*](#footnote-*):/' CHANGELOG.md
        else
          echo "::error::Unexpected format in CHANGELOG.md: Line 2 does not end with :"
          exit 1
        fi

        # Output the current changelog being written to README.md
        echo "::group::Changelog that will be written to README.md"
        cat CHANGELOG.md
        echo "::endgroup::"

        # Insert/update changelog section in README.md
        if [[ ! -f README.md || ! -s README.md ]]; then
          echo "::notice::README.md missing or empty; creating with changelog section only."
          echo "$changelog_start_marker" > README.md
          cat CHANGELOG.md >> README.md
          echo "" >> README.md
          echo "$changelog_end_marker" >> README.md
        else
          start_line=$(grep -n "$changelog_start_marker" README.md | cut -d: -f1 | head -n 1)
          end_line=$(grep -n "$changelog_end_marker" README.md | cut -d: -f1 | head -n 1)
          if [[ -n "$start_line" && -n "$end_line" ]]; then
            if [[ "$start_line" -ge "$end_line" ]]; then
              echo "::error::The CHANGELOG:START/END markers are in incorrect order and/or in the same line in README.md"
              exit 1
            fi
            if [[ $((end_line - start_line)) -le 1 ]]; then
              sed -i "$((start_line))r CHANGELOG.md" README.md
            else
              sed -i "$((start_line+1)),$((end_line-1))d" README.md
              sed -i "$((start_line))r CHANGELOG.md" README.md
            fi
            sed -i "$((start_line + $(wc -l < CHANGELOG.md)))a\\" README.md
            echo "::notice::Successfully updated changelog section in README.md."
          elif [[ -z "$start_line" && -z "$end_line" ]]; then
            echo "::error::No CHANGELOG:START/END markers found in README.md. Unable to update changelog section."
            exit 1
          else
            echo "::error::Incomplete changelog markers found in README.md. Both START and END markers are required."
            exit 1
          fi
        fi

    - name: reset CHANGELOG.md
      shell: bash
      run: |
        set -e
        printf '%s' '<!--publish=false-->' > CHANGELOG.md

    - name: commit and push changelog updates
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        set -e

        # Configure git user
        git config --global user.name "pnk2u"
        git config --global user.email "159317511+pnk2u@users.noreply.github.com"

        # Stage changed files
        git add CHANGELOG.md
        git add CHANGELOG_history.md
        git add README.md

        # Commit and push changes (avoid failing the whole job if there's nothing to commit)
        git commit -m "Update CHANGELOG_history and reset CHANGELOG ($VERSION)" || {
          echo "::notice::No changes to commit."
          exit 0
        }
        git push
