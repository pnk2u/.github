name: publish

on:
  workflow_call:
    secrets:
      MODRINTH_TOKEN:
        description: 'The token to use for Modrinth authentication'
        required: true
      CURSEFORGE_TOKEN:
        description: 'The token to use for Curseforge authentication'
        required: true
    inputs:
      default-branch:
        type: string
        description: 'The default branch to be referenced for changelog history links'
        required: false
        default: '1.21(.1)'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
        contents: write
    steps:

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnk2u/.github/.github/actions/prepare-changelog@main
        with:
          default-branch: ${{ inputs.default-branch }}

      - name: set up JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'microsoft'
          java-version: 25

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build files
        run: ./gradlew build

      - name: read metadata from gradle.properties
        id: properties
        uses: christian-draeger/read-properties@1.1.1
        with:
          path: './gradle.properties'
          properties: 'archives_base_name mod_name_short mod_version minecraft_version_supported minecraft_version_filter minecraft_version_name'

      - name: format version name and title
        id: format_version_name
        run: |
          escaped_version_name=$(echo "${{ steps.properties.outputs.minecraft_version_name }}" | sed 's/(/\\(/g; s/)/\\)/g')
          echo "escaped_version_name=$escaped_version_name" >> "$GITHUB_OUTPUT"
          mod_version_number="${{ steps.properties.outputs.mod_version }} + ${{ steps.properties.outputs.minecraft_version_name }}"
          mr_version_title="${{ steps.properties.outputs.mod_name_short }} $mod_version_number"
          cf_version_title="$mod_version_number - ${{ steps.properties.outputs.mod_name_short }}"
          file_path_glob="build/libs/${{ steps.properties.outputs.archives_base_name }}-${{ steps.properties.outputs.mod_version }}+$escaped_version_name-(Fabric|Quilt|Forge|NeoForge).jar"
          echo "mod_version_number=$mod_version_number" >> "$GITHUB_OUTPUT"
          echo "mr_version_title=$mr_version_title" >> "$GITHUB_OUTPUT"
          echo "cf_version_title=$cf_version_title" >> "$GITHUB_OUTPUT"
          echo "file_path_glob=$file_path_glob" >> "$GITHUB_OUTPUT"

      - uses: Kir-Antipov/mc-publish@v3.3
        id: publish-mr
        with:
          modrinth-featured: true
          modrinth-unfeature-mode: intersection
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          name: '${{ steps.format_version_name.outputs.mr_version_title }}'
          version: '${{ steps.properties.outputs.mod_version }}'

          game-versions: '${{ steps.properties.outputs.minecraft_version_supported }}'
          game-version-filter: '${{ steps.properties.outputs.minecraft_version_filter }}'

          version-type: release
          files: "${{ steps.format_version_name.outputs.file_path_glob }}"

          changelog-file: CHANGELOG.md

      - uses: Kir-Antipov/mc-publish@v3.3
        id: publish-cf
        with:
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          name: '${{ steps.format_version_name.outputs.cf_version_title }}'
          version: '${{ steps.properties.outputs.mod_version }}'

          game-versions: '${{ steps.properties.outputs.minecraft_version_supported }}'
          game-version-filter: '${{ steps.properties.outputs.minecraft_version_filter }}'

          version-type: release
          files: "${{ steps.format_version_name.outputs.file_path_glob }}"

          changelog-file: CHANGELOG_cf.md

      - uses: pnk2u/.github/.github/actions/publish-changelog@main
        with:
          version: ${{ steps.properties.outputs.mod_version }}
          modrinth-id: ${{ steps.publish-mr.outputs.modrinth-id }}
          modrinth-version: ${{ steps.publish-mr.outputs.modrinth-version }}
          curseforge-url: ${{ steps.publish-cf.outputs.curseforge-url }}
          version-number: ${{ steps.format_version_name.outputs.mod_version_number }}
          mr-version-title: ${{ steps.format_version_name.outputs.mr_version_title }}
          cf-version-title: ${{ steps.format_version_name.outputs.cf_version_title }}
